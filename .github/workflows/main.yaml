name: cloudtechies
on: workflow_dispatch
jobs:
    cloneandbuild:
        runs-on: ubuntu-latest
        steps:
            - name: codecheckout
              uses: actions/checkout@v6
            - name: setup node.js
              uses: actions/setup-node@v4
              with: 
                node-version: '18'
            - name: install-dependencies
              run: npm install
            - name: build
              run: npm run build 